# Еженедельный полный бэкап БД (опт + розница) на почту. Скрипт на VPS: server/scripts/weekly-email-backup.mjs
#
# Включение расписания: GitHub → Variables → WEEKLY_EMAIL_BACKUP_ENABLED = 1
# Нужны те же SSH-секреты, что и для Deploy to Reg VPS: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH
# На VPS в .env: DATABASE_URL, BACKUP_SMTP_* (см. .env.example). Получатель по умолчанию dakolosovs@mail.ru — BACKUP_EMAIL_TO
#
# Ручной запуск: Actions → Weekly database email backup → Run workflow

name: Weekly database email backup

on:
  schedule:
    - cron: "35 6 * * 1"
  workflow_dispatch:

jobs:
  weekly-backup:
    if: vars.WEEKLY_EMAIL_BACKUP_ENABLED == '1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — обновить код и отправить бэкап на почту
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            git fetch --all
            git reset --hard origin/main
            npm ci --omit=dev
            node server/scripts/weekly-email-backup.mjs
