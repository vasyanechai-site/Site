name: Deploy telegram-relay (Cloudflare)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/telegram-relay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID
            TELEGRAM_RELAY_SECRET
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RELAY_SECRET: ${{ secrets.TELEGRAM_RELAY_SECRET }}

      - name: Print VPS env hint
        run: |
          echo "На VPS / в deploy-reg-vps secrets задайте:"
          echo "TELEGRAM_RELAY_URL=https://telegram-relay.<account>.workers.dev"
          echo "TELEGRAM_RELAY_SECRET=(тот же секрет)"
